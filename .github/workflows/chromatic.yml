name: "Chromatic"

# Run on PRs only, and only when files that can actually affect visual output
# have changed. `ready_for_review` is listed so flipping a draft to ready
# triggers a fresh run; the job-level `if:` keeps it off draft PRs entirely
# (paths alone don't gate on draft state).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - ".storybook/**"
      - "chromatic.config.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/chromatic.yml"

jobs:
  chromatic:
    name: Run Chromatic
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          # Required by Chromatic so it can compare against the full git history
          # (baseline detection / TurboSnap). Don't lower this.
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Chromatic
        uses: chromaui/action@1bbb5819252d9782cb7d77122d9becae467def18 # v16
        with:
          # ⚠️ Make sure to configure a `CHROMATIC_PROJECT_TOKEN` repository secret
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
